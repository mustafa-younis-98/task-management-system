@if (toast$ | async; as toast) {
  <div
    class="toast-container position-fixed top-0 end-0 p-3"
    style="z-index: 1200"
  >
    <div
      class="toast show text-white"
      [class.bg-success]="toast.type === 'success'"
      [class.bg-danger]="toast.type === 'error'"
    >
      <div class="toast-body">
        {{ toast.message }}
      </div>
    </div>
  </div>
}
